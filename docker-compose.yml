version: "3.9"

services:
  api:
    build: .
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - qdrant

  worker:
    build: .
    command: arq workers.settings.WorkerSettings
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
      - qdrant

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: incidentmemory
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant:v1.12.4
    ports:
      - "6333:6333"
      - "6334:6334"
