services:
  - type: web
    name: incidentmemory-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: APP_ENV
        value: prod
      - key: LOG_LEVEL
        value: INFO
      - key: DATA_DIR
        value: ./data
      - key: EMBED_MODEL
        value: sentence-transformers/all-MiniLM-L6-v2
      - key: RERANK_MODEL
        value: cross-encoder/ms-marco-MiniLM-L-6-v2
      - key: TOP_K
        value: "8"
      - key: RERANK_TOP_N
        value: "5"
